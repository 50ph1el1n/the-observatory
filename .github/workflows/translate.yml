name: Translate & publish drafts

# Drop a note into /drafts and commit (from phone or anywhere). This workflow
# translates it to English, writes a finished article, and pushes — Vercel then
# auto-deploys. The bot's own commit carries [skip-translate] so it never loops.

on:
  push:
    paths:
      - "drafts/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: translate-drafts
  cancel-in-progress: false

jobs:
  translate:
    if: "!contains(github.event.head_commit.message, '[skip-translate]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Translate drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRANSLATE_MODEL: claude-sonnet-4-6
        run: node scripts/translate-draft.mjs

      - name: Commit & push results
        run: |
          git config user.name "sophie-city-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Publish translated article(s) [skip-translate]"
            git push
          else
            echo "Nothing to publish."
          fi
